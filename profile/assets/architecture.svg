<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .row-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; }
      .pill { rx: 14; ry: 14; }
      .pill-text { font-size: 11.5px; font-weight: 500; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <!-- Dashboard (right side, spanning Services to KMods/Drivers) -->
  <rect x="470" y="12" width="70" height="242" rx="14" ry="14" fill="#e8ecf4" stroke="#b0bcd4"/>
  <text x="505" y="133" class="pill-text" fill="#3d4f6e" writing-mode="tb" font-size="12" font-weight="600">Dashboard</text>

  <!-- Agents  y=12 -->
  <text x="16" y="28" class="row-label" fill="#7b5ea7">Agents</text>
  <rect x="110" y="12" width="160" height="30" class="pill" fill="#f0eaf8" stroke="#c9b1e0"/>
  <text x="190" y="27" class="pill-text" fill="#5b3d8a">Gura (PAR loop)</text>
  <rect x="278" y="12" width="110" height="30" class="pill" fill="#f0eaf8" stroke="#c9b1e0"/>
  <text x="333" y="27" class="pill-text" fill="#5b3d8a">TinyGura x N</text>

  <!-- Shell  y=56 -->
