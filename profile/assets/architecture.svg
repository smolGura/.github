  <rect x="352" y="268" width="82" height="30" class="pill" fill="#fdeee4" stroke="#e8b99c"/>
  <text x="393" y="283" class="pill-text" fill="#8a4a1a">Terminal</text>

  <!-- KMods / Drivers row 2  y=304 -->
  <rect x="110" y="304" width="78" height="30" class="pill" fill="#fdeee4" stroke="#e8b99c"/>
  <text x="149" y="319" class="pill-text" fill="#8a4a1a">Discord</text>
  <rect x="196" y="304" width="68" height="30" class="pill" fill="#fdeee4" stroke="#e8b99c"/>
  <text x="230" y="319" class="pill-text" fill="#8a4a1a">Phone</text>

  <!-- Infra  y=352 -->
  <text x="16" y="368" class="row-label" fill="#6a7080">Infra</text>
  <rect x="110" y="352" width="72" height="30" class="pill" fill="#ecedf1" stroke="#b8bcc6"/>
  <text x="146" y="367" class="pill-text" fill="#4a4f5a">Milvus</text>
